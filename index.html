// RNG — constantes reais do firmware (dmitry.gr)
// ═══════════════════════════════════════════════════════════════
class LCG {
  constructor(seed){ this.state = seed >>> 0; }
  next(){ this.state=((Math.imul(this.state,0x41C64E6D)+0x6073)>>>0); return this.state; }
  rand(max){ return (this.next()>>>16)%max; }
}
class IRNG {
  constructor(seed){ this.state = seed >>> 0; }
  next(){ this.state=((Math.imul(this.state,0xEEB9EB65)+0xA3561A1)>>>0); return this.state; }
  rand(max){ return (this.next()>>>16)%max; }
}

// Verifica se um PID é shiny para um dado TID/SID
// Formula: (TID XOR SID XOR PID_high XOR PID_low) < 8
function isShiny(pid, tid, sid){
  const pidHigh = (pid >>> 16) & 0xFFFF;
  const pidLow  =  pid        & 0xFFFF;
  return ((tid ^ sid ^ pidHigh ^ pidLow) < 8);
}

// Gera PID completo via LCG e verifica shiny
function generatePID(rng, tid, sid){
  const pid = ((rng.next() >>> 16) << 16) | (rng.next() >>> 16);
  return { pid: pid >>> 0, shiny: isShiny(pid >>> 0, tid, sid) };
}

function strollSeed(h,m,s){ return (h*3600+m*60+s)>>>0; }

function selectStrollPool(route,rng){
  const g={A:[],B:[],C:[]};
  route.pokemon.forEach(p=>g[p.group].push(p));
  return { A:g.A[rng.rand(g.A.length)], B:g.B[rng.rand(g.B.length)], C:g.C[rng.rand(g.C.length)] };
}

// Cascata A→B→C com rand único (mecânica real)
function resolveEncounter(pool,steps,typeAdv,rng){
  const mult=typeAdv?0.75:1.0;
  const rand=rng.rand(100);
  if(steps>=pool.A.steps*mult&&rand<pool.A.weight) return pool.A;
  if(steps>=pool.B.steps*mult&&rand<pool.B.weight) return pool.B;
  return pool.C;
}

// Rand independente por item (mecânica real)
function resolveItem(route,steps,irng){
  for(const item of route.items){
    if(steps>=item.steps && irng.rand(100)<item.weight) return item;
  }
  return route.items[route.items.length-1];
}

function resolveBalloon(happiness,irng){
  const r=irng.rand(100);
  if(happiness>=200&&r<15) return {watts:50,label:"Grande 💛"};
  if(happiness>=120&&r<35) return {watts:20,label:"Médio 💛"};
  if(r<60)                 return {watts:10,label:"Pequeno 💛"};
  return null;
}

function expForLevel(lvl){ return lvl*lvl*lvl; } // Medium Fast

// ── PERSISTÊNCIA VIA localStorage (persiste entre sessões) ──────
const LS_KEY = "pokewalker_save_v2";

function lsSave(data){
  try{
    localStorage.setItem(LS_KEY, JSON.stringify(data));
    return true;
  }catch(e){
    console.error("[PW] Erro ao salvar:", e);
    return false;
  }
}

function lsLoad(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return null;
    const data = JSON.parse(raw);
    if(!data.trainer) data.trainer = { name:"", tid:0, sid:0, game:"SoulSilver", lang:"Português" };
    return data;
  }catch(e){
    console.error("[PW] Erro ao carregar:", e);
    return null;
  }
}

function lsClear(){
  try{ localStorage.removeItem(LS_KEY); }catch{}
}

// COMPONENTE PRINCIPAL
// ═══════════════════════════════════════════════════════════════
function Pokewalker(){
  const [pw,setPw]       = useState(null);
  const [screen,setScreen] = useState("boot");
  const [stroll,setStroll] = useState(null);
  const [msg,setMsg]     = useState("");
  const [combat,setCombat] = useState(null);
  const [dowsing,setDowsing] = useState(null);
  const [result,setResult] = useState(null);
  const [setup,setSetup] = useState(BLANK);
  const [confirmReset,setConfirmReset] = useState(false);
  const lcgRef  = useRef(null);
  const irngRef = useRef(null);

  useEffect(()=>{
    const loaded = lsLoad();
    setPw(loaded || INIT);
    setTimeout(()=>setScreen("setup"), 800);
  },[]);

  const save=(next)=>{
    setPw(next);
    lsSave(next);
  };

  const toast=(m,ms=2800)=>{ setMsg(m); setTimeout(()=>setMsg(""),ms); };

  // Rotas disponíveis baseado em watts + pokédex nacional
  const availableRoutes=(totalWatts,hasNat)=>
    ROUTES.filter(r=> !r.event && r.watts<=totalWatts && (!r.nat||hasNat));

  // ── INICIAR PASSEIO ─────────────────────────────────────
  const startStroll=()=>{
    const now=new Date();
    const h=now.getHours(), m=now.getMinutes(), s=now.getSeconds();
    const seed=strollSeed(h,m,s);
    const lcg=new LCG(seed), irng=new IRNG(seed^0xAA55AA55);
    const route=ROUTES.find(r=>r.id===setup.route);
    const pool=selectStrollPool(route,lcg);
    lcgRef.current=lcg; irngRef.current=irng;
    const happiness=parseInt(setup.happiness)||70;
    const irngBalloon=new IRNG(seed^0xAA55AA55);
    const balloon=resolveBalloon(happiness,irngBalloon);
    const pkmTypes=[setup.type1,setup.type2].filter(Boolean).map(t=>t.trim());
    const typeAdv=pkmTypes.some(t=>route?.types?.includes(t));
    const pokemon={name:setup.name||"?",level:parseInt(setup.level)||1,exp:parseInt(setup.exp)||0,happiness};
    const newUnlocked=availableRoutes(pw?.totalWatts||0,pw?.hasNationalDex||false).map(r=>r.id);
    save({...pw,currentPokemon:pokemon,unlockedRoutes:newUnlocked});
    setStroll({route,pool,steps:0,watts:0,wattsFromSteps:0,wattsSpent:0,balloonWatts:0,
      seed:"0x"+seed.toString(16).toUpperCase().padStart(8,"0"),
      startTime:Date.now(),
      pokemon,typeAdv,capturedPokemon:[],foundItems:[],balloon,balloonCollected:false});
    setSetup(BLANK);
    setScreen("home");
  };

  const spendWatts=(cost)=>{
    if(!stroll||stroll.watts<cost){ toast(`Watts insuficientes! (${stroll?.watts||0}W)`); return false; }
    setStroll(s=>({...s,watts:s.watts-cost,wattsSpent:s.wattsSpent+cost}));
    return true;
  };

  // ── ADICIONAR PASSOS AO LONGO DO DIA ──────────────────
  const addSteps=(n)=>{
    if(!n||n<=0) return;
    const newSteps = (stroll.steps||0) + n;
    const newWatts = Math.floor(newSteps/20);
    const addedWatts = newWatts - Math.floor((stroll.steps||0)/20);
    // Re-rola o balão se ainda não foi coletado
    const seed = parseInt(stroll.seed,16);
    const irngBalloon = new IRNG(seed^0xAA55AA55);
    const balloon = stroll.balloonCollected ? null : resolveBalloon(stroll.pokemon.happiness, irngBalloon);
    setStroll(s=>({...s,
      steps: newSteps,
      watts: s.watts + addedWatts,
      wattsFromSteps: newWatts,
      balloon: s.balloonCollected ? s.balloon : balloon,
    }));
    if(addedWatts>0) toast(`+${n} passos · +${addedWatts}W gerados!`);
    else toast(`+${n} passos adicionados!`);
  };

  const collectBalloon=()=>{
    if(!stroll?.balloon||stroll.balloonCollected) return;
    const w=stroll.balloon.watts;
    setStroll(s=>({...s,watts:s.watts+w,balloonWatts:w,balloonCollected:true,balloon:null}));
    toast(`+${w} Watts coletados!`);
  };

  // ── RADAR ──────────────────────────────────────────────
  const startRadar=()=>{
    if(stroll.capturedPokemon.length>=3){ toast("Inventário cheio! Máx. 3 Pokémon."); return; }
    if(!spendWatts(10)) return;
    const wild=resolveEncounter(stroll.pool,stroll.steps,stroll.typeAdv,lcgRef.current);
    setCombat({wild,playerHP:4,wildHP:4,log:[`Um ${wild.name} selvagem apareceu!`],over:false,result:null});
    setScreen("radar");
  };

  const battleAction=(action)=>{
    if(combat.over) return;
    const lcg=lcgRef.current;
    let {playerHP,wildHP,log}=combat;
    const newLog=[]; let over=false,res=null;
    const wildIntent=lcg.rand(4)<3?"attack":"flee";
    if(action==="attack"){
      const isCrit=lcg.rand(16)===0||wildIntent==="flee";
      const dmg=isCrit?2:1;
      wildHP=Math.max(0,wildHP-dmg);
      newLog.push(isCrit?`Crítico! ${combat.wild.name} perdeu ${dmg}HP`:`Você atacou! ${combat.wild.name} perdeu 1HP`);
      if(wildIntent==="attack"){ playerHP=Math.max(0,playerHP-1); newLog.push(`${combat.wild.name} contra-atacou! -1HP`); }
      if(wildIntent==="flee") newLog.push(`${combat.wild.name} tentou fugir!`);
    }
    if(action==="evade"){
      if(wildIntent==="attack"){ wildHP=Math.max(0,wildHP-1); newLog.push(`Esquivou e contra-atacou! ${combat.wild.name} -1HP`); }
      else if(wildIntent==="flee"){ over=true; res="escaped"; newLog.push(`${combat.wild.name} fugiu!`); }
      else newLog.push("Você se preparou... nada aconteceu.");
    }
    if(action==="catch"){
      const rates={4:5,3:20,2:50,1:90};
      const rate=rates[Math.max(1,wildHP)]??5;
      const roll=lcg.rand(100);
      if(roll<rate){ over=true; res="caught"; newLog.push(`${combat.wild.name} foi capturado! 🎉`); if(isShiny(((lcgRef.current.state>>>16)<<16)|(lcgRef.current.state&0xFFFF),pw?.trainer?.tid||0,pw?.trainer?.sid||0)) newLog.push("✨ É SHINY!"); }
      else{
        newLog.push(`Captura falhou... (${roll+1}/${rate}%)`);
        if(wildIntent==="attack"){ playerHP=Math.max(0,playerHP-1); newLog.push(`${combat.wild.name} atacou! -1HP`); }
      }
    }
    if(wildHP<=0&&!over){ over=true; res="fainted"; newLog.push(`${combat.wild.name} desmaiou!`); }
    if(playerHP<=0&&!over){ over=true; res="lost"; newLog.push("Você foi derrotado..."); }
    setCombat(p=>({...p,playerHP,wildHP,log:[...p.log,...newLog],over,result:res}));
    if(over&&res==="caught"){
      const tid=pw?.trainer?.tid||0, sid=pw?.trainer?.sid||0;
      const {pid,shiny}=generatePID(lcgRef.current,tid,sid);
      setStroll(s=>({...s,capturedPokemon:[...s.capturedPokemon,{name:combat.wild.name,gender:combat.wild.gender,level:combat.wild.level,pid:"0x"+pid.toString(16).toUpperCase().padStart(8,"0"),shiny}]}));
    }
  };

  // ── DOWSING ────────────────────────────────────────────
  const startDowsing=()=>{
    if(stroll.foundItems.length>=3){ toast("Inventário cheio! Máx. 3 itens."); return; }
    if(!spendWatts(3)) return;
    const item=resolveItem(stroll.route,stroll.steps,irngRef.current);
    const pos=irngRef.current.rand(6);
    setDowsing({item,pos,chosen:null,hint:null,attempts:0,over:false,result:null});
    setScreen("dowsing");
  };

  const chooseBush=(idx)=>{
    if(dowsing.over) return;
    if(idx===dowsing.pos){
      setDowsing(d=>({...d,chosen:idx,over:true,result:"found"}));
      setStroll(s=>({...s,foundItems:[...s.foundItems,dowsing.item]}));
    } else if(dowsing.attempts===0){
      setDowsing(d=>({...d,chosen:idx,hint:Math.abs(idx-dowsing.pos)===1?"Perto! 🔥":"Longe! ❄️",attempts:1}));
    } else {
      setDowsing(d=>({...d,chosen:idx,over:true,result:"miss"}));
    }
  };

  // ── ENCERRAR PASSEIO ───────────────────────────────────
  const endStroll=()=>{
    if(!stroll) return;
    const poke=stroll.pokemon;
    const newExp=poke.exp+stroll.steps;
    const leveledUp=newExp>=expForLevel(poke.level+1);
    const finalLevel=leveledUp?poke.level+1:poke.level;
    const hapGain=Math.min(255-poke.happiness,Math.floor(stroll.steps/100));
    const newHap=poke.happiness+hapGain;
    const wattsReturned=stroll.watts;
    const newTotal=(pw?.totalWatts||0)+wattsReturned;
    const newNat=pw?.hasNationalDex||false;
    const newUnlocked=availableRoutes(newTotal,newNat).map(r=>r.id);
    const newSevenDay=[...(pw?.sevenDay||[0,0,0,0,0,0,0]).slice(1),stroll.steps];
    const sess={
      id:Date.now(), date:new Date().toLocaleDateString("pt-BR"),
      route:stroll.route.name, pokemon:poke.name, steps:stroll.steps,
      wattsFromSteps:stroll.wattsFromSteps, balloonWatts:stroll.balloonWatts,
      wattsSpent:stroll.wattsSpent, wattsReturned,
      expBefore:poke.exp, expAfter:newExp,
      levelBefore:poke.level, levelAfter:finalLevel, leveledUp,
      hapBefore:poke.happiness, hapAfter:newHap,
      capturedPokemon:stroll.capturedPokemon, foundItems:stroll.foundItems,
    };
    const newPw={
      ...pw, totalWatts:newTotal,
      lifetimeSteps:(pw?.lifetimeSteps||0)+stroll.steps,
      unlockedRoutes:newUnlocked,
      sessions:[sess,...(Array.isArray(pw?.sessions)?pw.sessions:[])].slice(0,50),
      pkmnBox:[...(pw?.pkmnBox||[]),...stroll.capturedPokemon].slice(0,99),
      itemBox:[...(pw?.itemBox||[]),...stroll.foundItems.map(i=>i.name)].slice(0,99),
      sevenDay:newSevenDay,
      currentPokemon:{...poke,exp:newExp,level:finalLevel,happiness:newHap},
    };
    save(newPw);
    setResult({sess,newTotal,newUnlocked,prevTotal:pw?.totalWatts||0,newNat});
    setStroll(null); setCombat(null); setDowsing(null);
    setScreen("result");
  };

  if(!pw) return <div style={{background:C.bg,height:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:C.green,fontFamily:"monospace",letterSpacing:"4px"}}>POKÉWALKER...</div></div>;

  // ── RENDER ─────────────────────────────────────────────
  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:"'Courier New',monospace",color:C.white,display:"flex",flexDirection:"column",alignItems:"center",padding:"20px 0 60px"}}>
      <style>{`
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
        @keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .btn{transition:all .12s;cursor:pointer;border:none;font-family:'Courier New',monospace;outline:none;}
        .btn:hover:not(:disabled){filter:brightness(1.2);}
        .btn:active:not(:disabled){transform:scale(.96);}
        .bush:hover:not(:disabled){background:#1e2a1e!important;border-color:#3fb950!important;}
        ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px;}
      `}</style>
      <div style={{width:"100%",maxWidth:"360px",background:"#1c2128",border:`2px solid ${C.bor}`,borderRadius:"22px",boxShadow:"0 16px 56px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.04)",overflow:"hidden"}}>
        <div style={{padding:"12px 20px 4px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:"9px",color:"#3d444d",letterSpacing:"3px"}}>POKÉWALKER</span>
          <div style={{width:"8px",height:"8px",borderRadius:"50%",background:stroll?C.green:"#3d444d",boxShadow:stroll?`0 0 8px ${C.green}`:"none",transition:"all .4s"}}/>
        </div>
        <div style={{background:"#0b0f14",margin:"0 14px",borderRadius:"10px",minHeight:"308px",border:"1px solid #21262d",padding:"14px",position:"relative",overflow:"hidden"}}>
          {msg&&<div onClick={()=>setMsg("")} style={{position:"absolute",top:"8px",left:"8px",right:"8px",background:"#1c2128",border:`1px solid ${C.yellow}`,borderRadius:"6px",padding:"8px 12px",fontSize:"11px",color:C.yellow,zIndex:20,cursor:"pointer",animation:"fadeIn .2s"}}>{msg}</div>}
          {screen==="boot"    && <BootScreen/>}
          {screen==="setup"   && <SetupScreen setup={setup} setSetup={setSetup} pw={pw} availableRoutes={availableRoutes} onStart={startStroll} onStats={()=>setScreen("stats")}/>}
          {screen==="home"    && stroll && <HomeScreen stroll={stroll} pw={pw} onMenu={()=>setScreen("menu")} onBalloon={collectBalloon} onAddSteps={addSteps}/>}
          {screen==="menu"    && stroll && <MenuScreen stroll={stroll} onRadar={startRadar} onDowsing={startDowsing} onStats={()=>setScreen("stats")} onBack={()=>setScreen("home")} onEnd={endStroll} onAddSteps={addSteps}/>}
          {screen==="radar"   && combat  && <RadarScreen combat={combat} onAction={battleAction} onBack={()=>{setScreen("home");setCombat(null);}}/>}
          {screen==="dowsing" && dowsing && <DowsingScreen dowsing={dowsing} onChoose={chooseBush} onBack={()=>{setScreen("home");setDowsing(null);}}/>}
          {screen==="stats"   && <StatsScreen pw={pw} stroll={stroll} onBack={()=>setScreen(stroll?"menu":"setup")} onToggleNat={()=>{ const n={...pw,hasNationalDex:!pw.hasNationalDex}; save(n); }} confirmReset={confirmReset} onReset={()=>setConfirmReset(true)} onResetConfirm={()=>{lsClear();setPw(INIT);setStroll(null);setConfirmReset(false);setScreen("setup");}} onResetCancel={()=>setConfirmReset(false)} onSaveTrainer={(trainer)=>save({...pw,trainer})}/>}
          {screen==="result"  && result  && <ResultScreen result={result} onNew={()=>{setSetup(BLANK);setScreen("setup");}}/>}
        </div>
        <div style={{padding:"10px 20px 18px",display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:"10px",color:C.gray}}>⚡ {stroll?`${stroll.watts}W disponíveis`:`${pw.totalWatts}W acumulados`}</span>
          <span style={{fontSize:"10px",color:C.gray}}>{stroll?`${stroll.steps.toLocaleString()} passos`:`${(pw.lifetimeSteps||0).toLocaleString()} passos`}</span>
        </div>
      </div>
    </div>
  );
}

// TELAS
// ═══════════════════════════════════════════════════════════════
function BootScreen(){
  return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"280px"}}><div style={{textAlign:"center"}}><div style={{fontSize:"36px",marginBottom:"12px"}}>👣</div><div style={{color:"#3fb950",letterSpacing:"4px",fontSize:"12px",animation:"pulse 1s infinite"}}>POKÉWALKER</div></div></div>;
}

function SetupScreen({setup,setSetup,pw,availableRoutes,onStart,onStats}){
  const f=(k,v)=>setSetup(s=>({...s,[k]:v}));
  const totalWatts=pw?.totalWatts||0;
  const hasNat=pw?.hasNationalDex||false;
  const avail=availableRoutes(totalWatts,hasNat);
  const locked=ROUTES.filter(r=>!r.event&&!avail.find(a=>a.id===r.id));
  const events=ROUTES.filter(r=>r.event);
  const canStart=setup.name&&setup.level;

  return (
    <div style={{animation:"slideUp .3s",overflowY:"auto",maxHeight:"280px"}}>
      <STitle title="ENVIAR POKÉMON" color={C.blue}/>
      <Grp label="POKÉMON">
        <Rw label="Nome">      <Inp v={setup.name}      on={v=>f("name",v)}      ph="Nome do Pokémon"/></Rw>
        <Rw label="Nível">     <Inp v={setup.level}     on={v=>f("level",v)}     ph="Nível" type="number"/></Rw>
        <Rw label="EXP">       <Inp v={setup.exp}       on={v=>f("exp",v)}       ph="EXP atual" type="number"/></Rw>
        <Rw label="Felicidade"><Inp v={setup.happiness} on={v=>f("happiness",v)} ph="0–255" type="number"/></Rw>
      </Grp>

      <Grp label={`ROTAS DESBLOQUEADAS (${avail.length})`}>
        {avail.map(r=>(
          <button key={r.id} className="btn" onClick={()=>f("route",r.id)} style={{display:"block",width:"100%",padding:"8px 10px",borderRadius:"6px",fontSize:"11px",textAlign:"left",marginBottom:"4px",background:setup.route===r.id?"#1a2e1a":"#161b22",color:setup.route===r.id?C.green:C.gray,border:`1px solid ${setup.route===r.id?C.green:C.bor}`}}>
            {setup.route===r.id?"▶ ":"  "}{r.name}
            <span style={{float:"right",fontSize:"10px",opacity:.5}}>{r.types.join(" · ")}</span>
          </button>
        ))}

        {events.length>0&&<>
          <div style={{fontSize:"9px",color:C.teal,letterSpacing:"1px",margin:"8px 0 4px"}}>EVENTOS</div>
          {events.map(r=>(
            <button key={r.id} className="btn" onClick={()=>f("route",r.id)} style={{display:"block",width:"100%",padding:"8px 10px",borderRadius:"6px",fontSize:"11px",textAlign:"left",marginBottom:"4px",background:setup.route===r.id?"#1a2e1a":"#161b22",color:setup.route===r.id?C.teal:C.gray,border:`1px solid ${setup.route===r.id?C.teal:C.bor}`}}>
              ✨ {r.name}
            </button>
          ))}
        </>}

        {locked.length>0&&<>
          <div style={{fontSize:"9px",color:C.gray,letterSpacing:"1px",margin:"8px 0 4px"}}>BLOQUEADAS</div>
          {locked.map(r=>(
            <div key={r.id} style={{padding:"7px 10px",borderRadius:"6px",fontSize:"11px",marginBottom:"3px",background:"#0d1117",color:"#3d444d",border:"1px solid #21262d"}}>
              🔒 {r.name}
              <span style={{float:"right",fontSize:"10px"}}>{r.nat?"Pokédex Nacional":r.watts>0?`${r.watts.toLocaleString()}W`:""}</span>
            </div>
          ))}
        </>}

        {/* Tipos do Pokémon + vantagem calculada */}
        <div style={{marginTop:"8px"}}>
          <div style={{fontSize:"9px",color:C.gray,letterSpacing:"1px",marginBottom:"4px"}}>TIPOS DO SEU POKÉMON</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginBottom:"6px"}}>
            <Inp v={setup.type1} on={v=>f("type1",v)} ph="Tipo 1 (ex: Water)"/>
            <Inp v={setup.type2} on={v=>f("type2",v)} ph="Tipo 2 (opcional)"/>
          </div>
          {(()=>{
            const selectedRoute=ROUTES.find(r=>r.id===setup.route);
            const types=[setup.type1,setup.type2].filter(Boolean).map(t=>t.trim());
            const hasAdv=types.some(t=>selectedRoute?.types?.includes(t));
            const routeTypes=selectedRoute?.types||[];
            return (
              <div style={{padding:"7px 10px",borderRadius:"6px",fontSize:"11px",background:hasAdv?"#1a2e1a":"#161b22",border:`1px solid ${hasAdv?C.green:C.bor}`}}>
                <div style={{color:C.gray,marginBottom:"3px"}}>Tipos favoráveis desta rota:</div>
                <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                  {routeTypes.map(t=>{
                    const match=types.includes(t);
                    return <span key={t} style={{padding:"2px 8px",borderRadius:"4px",fontSize:"10px",background:match?"#238636":"#21262d",color:match?"#fff":C.gray,fontWeight:match?"bold":"normal"}}>{t}{match?" ✓":""}</span>;
                  })}
                </div>
                {types.length>0&&<div style={{marginTop:"5px",fontSize:"10px",color:hasAdv?C.green:C.gray}}>{hasAdv?"✓ Vantagem ativa — req. de passos −25%":"✗ Sem vantagem de tipo nesta rota"}</div>}
              </div>
            );
          })()}
        </div>
      </Grp>

      <Btn onClick={onStart} disabled={!canStart} color={C.gdim} label="▶ INICIAR PASSEIO"/>
      <button className="btn" onClick={onStats} style={{display:"block",width:"100%",padding:"9px",borderRadius:"8px",marginTop:"6px",background:"transparent",border:`1px solid ${C.bor}`,color:C.gray,fontSize:"11px",letterSpacing:"1px"}}>
        📊 ESTATÍSTICAS E HISTÓRICO
      </button>
    </div>
  );
}

function HomeScreen({stroll,pw,onMenu,onBalloon,onAddSteps}){
  const poke=stroll.pokemon;
  const hearts=Math.min(5,Math.floor(poke.happiness/51));
  const projectedTotal=(pw?.totalWatts||0)+stroll.watts;
  const [stepInput,setStepInput]=React.useState("");
  const presets=[100,500,1000,2000,5000];
  return (
    <div style={{animation:"slideUp .25s"}}>
      <div style={{textAlign:"center",padding:"8px 0 10px"}}>
        <div style={{fontSize:"56px",marginBottom:"4px",textAlign:"center"}}>{EMOJI[poke.name]||"🦎"}</div>
        <div style={{fontSize:"18px",fontWeight:"bold",color:C.white}}>{poke.name}</div>
        <div style={{fontSize:"11px",color:C.gray,marginTop:"2px"}}>Lv.{poke.level} · {stroll.route.name}</div>
        <div style={{fontSize:"13px",color:C.pink,marginTop:"4px"}}>{"♥".repeat(hearts)}{"♡".repeat(Math.max(0,5-hearts))}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px",marginBottom:"10px"}}>
        <Pill label="Passos" value={stroll.steps.toLocaleString()} color={C.blue}/>
        <Pill label="Watts"  value={`${stroll.watts}W`}           color={C.yellow}/>
        <Pill label="EXP +"  value={`+${stroll.steps}`}           color={C.amber}/>
      </div>
      {stroll.balloon&&!stroll.balloonCollected&&(
        <div onClick={onBalloon} style={{background:"#1a2e1a",border:`1px solid ${C.green}`,borderRadius:"8px",padding:"10px",marginBottom:"10px",cursor:"pointer",textAlign:"center",animation:"pulse 1.4s infinite"}}>
          <div style={{fontSize:"20px"}}>💬</div>
          <div style={{fontSize:"11px",color:C.green,marginTop:"2px"}}>{poke.name} encontrou {stroll.balloon.label}!</div>
          <div style={{fontSize:"9px",color:C.gray,marginTop:"2px"}}>Toque para coletar</div>
        </div>
      )}
      {/* ADICIONAR PASSOS */}
      <div style={{background:"#161b22",border:`1px solid ${C.bor}`,borderRadius:"8px",padding:"10px",marginBottom:"10px"}}>
        <div style={{fontSize:"9px",color:C.gray,letterSpacing:"2px",marginBottom:"8px"}}>ADICIONAR PASSOS</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"4px",marginBottom:"8px"}}>
          {presets.map(n=>(
            <button key={n} className="btn" onClick={()=>onAddSteps(n)}
              style={{padding:"6px 2px",borderRadius:"6px",background:"#21262d",border:`1px solid ${C.bor}`,color:C.blue,fontSize:"10px",fontWeight:"bold"}}>
              +{n>=1000?`${n/1000}k`:n}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:"6px"}}>
          <input value={stepInput} onChange={e=>setStepInput(e.target.value)} type="number" placeholder="Quantidade personalizada"
            style={{flex:1,padding:"6px 8px",background:"#21262d",border:`1px solid ${C.bor}`,borderRadius:"5px",color:C.white,fontFamily:"'Courier New',monospace",fontSize:"12px",outline:"none"}}/>
          <button className="btn" onClick={()=>{const n=parseInt(stepInput);if(n>0){onAddSteps(n);setStepInput("");}}}
            style={{padding:"6px 12px",borderRadius:"6px",background:C.gdim,border:"none",color:"#fff",fontSize:"12px",fontWeight:"bold"}}>
            +
          </button>
        </div>
      </div>
      <div style={{display:"flex",gap:"6px",marginBottom:"12px"}}>
        <ISlot label="Pokemon" count={stroll.capturedPokemon.length} max={3} color={C.purple}/>
        <ISlot label="Itens"   count={stroll.foundItems.length}      max={3} color={C.green}/>
        <ISlot label="W total" value={`${projectedTotal}W`}               color={C.yellow}/>
      </div>
      <Btn onClick={onMenu} label="▼ MENU" color="#21262d" bor={C.bor}/>
    </div>
  );
}

  const fp=stroll.capturedPokemon.length>=3, fi=stroll.foundItems.length>=3;
  const presets=[100,500,1000,5000];
  return (
    <div style={{animation:"slideUp .2s",overflowY:"auto",maxHeight:"280px"}}>
      <TBar title="MENU" onBack={onBack}/>
      <div style={{display:"flex",flexDirection:"column",gap:"7px",marginTop:"6px"}}>
        <MBtn icon="🎯" label="Poké Radar"    color={C.red}   sub={fp?"Inventário cheio (3/3)":`10W · você tem ${stroll.watts}W`} disabled={stroll.watts<10||fp} onClick={onRadar}/>
        <MBtn icon="🔍" label="Dowsing MCHN"  color={C.blue}  sub={fi?"Inventário cheio (3/3)":`3W · você tem ${stroll.watts}W`}  disabled={stroll.watts<3||fi}  onClick={onDowsing}/>
        <MBtn icon="📊" label="Estatísticas"  color={C.gray}  sub="Histórico e rotas" onClick={onStats}/>

          <div style={{fontSize:"9px",color:C.gray,letterSpacing:"2px",marginBottom:"6px"}}>ADICIONAR PASSOS</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"4px"}}>
            {presets.map(n=>(
              <button key={n} className="btn" onClick={()=>onAddSteps(n)}
                style={{padding:"7px 2px",borderRadius:"6px",background:"#21262d",border:`1px solid ${C.bor}`,color:C.blue,fontSize:"10px",fontWeight:"bold"}}>
                +{n>=1000?`${n/1000}k`:n}
              </button>
            ))}
          </div>
        </div>
        <div style={{height:"1px",background:C.bor,margin:"2px 0"}}/>
        <MBtn icon="🏠" label="Retornar ao DS" color={C.green} sub={`Encerrar · retornar ${stroll.watts}W ao jogo`} onClick={onEnd}/>
      </div>
      {(stroll.capturedPokemon.length>0||stroll.foundItems.length>0)&&(
        <div style={{marginTop:"10px",padding:"10px",background:"#161b22",borderRadius:"8px",border:`1px solid ${C.bor}`}}>
          <div style={{fontSize:"9px",color:C.gray,letterSpacing:"1px",marginBottom:"6px"}}>INVENTÁRIO DO PASSEIO</div>
          {stroll.capturedPokemon.map((p,i)=><div key={i} style={{fontSize:"11px",color:C.purple,marginBottom:"3px"}}>{p.shiny?"✨":EMOJI[p.name]||"🔵"} {p.name} {p.gender} Lv.{p.level}{p.shiny?" ⭐SHINY":""}</div>)}
          {stroll.foundItems.map((it,i)=><div key={i} style={{fontSize:"11px",color:C.green,marginBottom:"3px"}}>🎒 {it.name}</div>)}
        </div>
      )}
    </div>
  );
}

  const {wild,playerHP,wildHP,log,over,result}=combat;
  const hint=wildHP>=3?"Baixa":wildHP===2?"Média":"Alta";
  return (
    <div style={{animation:"slideUp .2s"}}>
      <TBar title="POKÉ RADAR" onBack={over?onBack:null}/>
      <div style={{textAlign:"center",margin:"6px 0 10px"}}>
        <div style={{fontSize:"40px",textAlign:"center"}}>{EMOJI[wild.name]||"❓"}</div>
        <div style={{fontSize:"15px",fontWeight:"bold",color:C.amber,marginTop:"4px"}}>{wild.name} {wild.gender} Lv.{wild.level}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}}>
        <HPB label="Você"     hp={playerHP} max={4} color={C.green}/>
        <HPB label={wild.name} hp={wildHP}  max={4} color={C.red}/>
      </div>
      <div style={{background:"#161b22",borderRadius:"6px",padding:"8px 10px",minHeight:"62px",maxHeight:"80px",overflowY:"auto",border:`1px solid ${C.bor}`,marginBottom:"10px"}}>
        {log.slice(-4).map((l,i)=><div key={i} style={{fontSize:"11px",color:C.white,marginBottom:"2px"}}>▸ {l}</div>)}
      </div>
      {!over?(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px"}}>
          <ABt icon="⚔️" label="Atacar"   sub="1 dano (crítico 2)" color={C.red}  onClick={()=>onAction("attack")}/>
          <ABt icon="🛡️" label="Esquivar" sub="Esquiva+contra-ataque" color={C.blue} onClick={()=>onAction("evade")}/>
          <ABt icon="🔴" label="Capturar" sub={`Chance: ${hint}`} color={wildHP<=2?C.green:C.gray} onClick={()=>onAction("catch")}/>
        </div>
      ):(
        <div style={{textAlign:"center",paddingTop:"4px"}}>
          <div style={{fontSize:"14px",fontWeight:"bold",marginBottom:"12px",color:result==="caught"?C.green:result==="fainted"?C.amber:C.red}}>
            {result==="caught"&&`✓ ${wild.name} capturado!`}
            {result==="fainted"&&`${wild.name} desmaiou!`}
            {result==="escaped"&&`${wild.name} fugiu...`}
            {result==="lost"&&"Você foi derrotado..."}
          </div>
          <Btn onClick={onBack} label="VOLTAR" color={C.gdim}/>
        </div>
      )}
    </div>
  );
}

function DowsingScreen({dowsing,onChoose,onBack}){
  return (
    <div style={{animation:"slideUp .2s"}}>
      <TBar title="DOWSING MCHN" onBack={dowsing.over?onBack:null}/>
      <div style={{textAlign:"center",minHeight:"40px",margin:"8px 0 14px"}}>
        {!dowsing.over&&!dowsing.hint&&<div style={{fontSize:"11px",color:C.gray}}>Escolha um arbusto</div>}
        {dowsing.hint&&!dowsing.over&&<div style={{fontSize:"13px",color:C.yellow,fontWeight:"bold"}}>{dowsing.hint}</div>}
        {dowsing.over&&<div style={{fontSize:"13px",fontWeight:"bold",color:dowsing.result==="found"?C.green:C.red}}>{dowsing.result==="found"?`✓ ${dowsing.item.name} encontrado!`:"Nada encontrado..."}</div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px",margin:"0 4px 16px"}}>
        {[0,1,2,3,4,5].map(i=>{
          const ok=dowsing.over&&i===dowsing.pos, bad=dowsing.over&&i===dowsing.chosen&&i!==dowsing.pos, hint=!dowsing.over&&i===dowsing.chosen;
          const dis=dowsing.over||(dowsing.attempts>0&&i===dowsing.chosen);
          return <button key={i} className={`btn${dis?"":" bush"}`} onClick={()=>onChoose(i)} disabled={dis} style={{padding:"20px 0",borderRadius:"8px",fontSize:"22px",background:ok?"#1a2e1a":bad?"#2d1a1a":hint?"#1c2128":"#161b22",border:`1px solid ${ok?C.green:bad?C.red:hint?C.yellow:C.bor}`,cursor:dis?"default":"pointer",opacity:dis&&!ok&&!bad?0.5:1}}>{ok?"✨":bad?"✗":hint?"❓":"🌿"}</button>;
        })}
      </div>
      {dowsing.over&&<Btn onClick={onBack} label="VOLTAR" color={C.gdim}/>}
    </div>
  );
}

function StatsScreen({pw,stroll,onBack,onToggleNat,onReset,onResetConfirm,onResetCancel,confirmReset,onSaveTrainer}){
  const [editTrainer,setEditTrainer] = React.useState(false);
  const [t,setT] = React.useState({...pw.trainer});
  const f=(k,v)=>setT(s=>({...s,[k]:v}));
  return (
    <div style={{animation:"slideUp .2s",overflowY:"auto",maxHeight:"280px"}}>
      <TBar title="ESTATÍSTICAS" onBack={onBack}/>
      <div style={{marginTop:"6px"}}>
        <div style={{background:"#161b22",border:`1px solid ${C.bor}`,borderRadius:"8px",padding:"10px 12px",marginBottom:"10px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
            <div style={{fontSize:"9px",color:C.gray,letterSpacing:"2px"}}>TREINADOR</div>
            <button className="btn" onClick={()=>{setT({...pw.trainer});setEditTrainer(e=>!e);}} style={{padding:"3px 8px",borderRadius:"4px",background:"#21262d",border:`1px solid ${C.bor}`,color:C.gray,fontSize:"10px"}}>
              {editTrainer?"Cancelar":"Editar"}
            </button>
          </div>
          {!editTrainer ? (
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:"15px",fontWeight:"bold",color:pw.trainer.name?C.white:C.gray}}>{pw.trainer.name||"(sem nome)"}</div>
                <div style={{fontSize:"10px",color:C.gray,marginTop:"2px"}}>{pw.trainer.game} - {pw.trainer.lang}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:"10px",color:C.gray}}>TID: <span style={{color:C.white}}>{String(pw.trainer.tid).padStart(5,"0")}</span></div>
                <div style={{fontSize:"10px",color:C.gray}}>SID: <span style={{color:C.white}}>{String(pw.trainer.sid).padStart(5,"0")}</span></div>
              </div>
            </div>
          ) : (
            <div>
              <Rw label="Nome"><Inp v={t.name} on={v=>f("name",v)} ph="Nome do treinador"/></Rw>
              <Rw label="TID"><Inp v={String(t.tid)} on={v=>f("tid",v)} ph="0-65535" type="number"/></Rw>
              <Rw label="SID"><Inp v={String(t.sid)} on={v=>f("sid",v)} ph="0-65535" type="number"/></Rw>
              <Rw label="Jogo">
                <select value={t.game} onChange={e=>f("game",e.target.value)} style={{width:"100%",padding:"6px 8px",background:"#21262d",border:`1px solid ${C.bor}`,borderRadius:"5px",color:C.white,fontFamily:"'Courier New',monospace",fontSize:"12px",outline:"none"}}>
                  <option>HeartGold</option>
                  <option>SoulSilver</option>
                </select>
              </Rw>
              <Rw label="Idioma">
                <select value={t.lang} onChange={e=>f("lang",e.target.value)} style={{width:"100%",padding:"6px 8px",background:"#21262d",border:`1px solid ${C.bor}`,borderRadius:"5px",color:C.white,fontFamily:"'Courier New',monospace",fontSize:"12px",outline:"none"}}>
                  <option>Portugues</option>
                  <option>Ingles</option>
                  <option>Espanhol</option>
                  <option>Japones</option>
                  <option>Frances</option>
                  <option>Alemao</option>
                  <option>Italiano</option>
                </select>
              </Rw>
              <button className="btn" onClick={()=>{onSaveTrainer({name:t.name,tid:parseInt(t.tid)||0,sid:parseInt(t.sid)||0,game:t.game,lang:t.lang});setEditTrainer(false);}} style={{width:"100%",padding:"8px",borderRadius:"6px",background:C.gdim,border:"none",color:"#fff",fontSize:"11px",fontWeight:"bold",marginTop:"4px"}}>
                Salvar treinador
              </button>
            </div>
          )}
        </div>
        <SR label="Watts acumulados"    v={`${pw.totalWatts.toLocaleString()}W`} c={C.yellow}/>
        <SR label="Passos totais"       v={(pw.lifetimeSteps||0).toLocaleString()}  c={C.blue}/>
        <SR label="Rotas desbloqueadas" v={`${pw.unlockedRoutes.length} / ${ROUTES.filter(r=>!r.event).length}`} c={C.green}/>
        <SR label="Passeios realizados" v={pw.sessions.length}                     c={C.purple}/>
        <SR label="Pokédex Nacional"    v={pw.hasNationalDex?"Obtida":"Nao obtida"} c={pw.hasNationalDex?C.green:C.gray}/>
        <button className="btn" onClick={onToggleNat} style={{width:"100%",padding:"8px",borderRadius:"6px",background:"#161b22",border:`1px solid ${C.bor}`,color:C.gray,fontSize:"10px",marginTop:"6px",marginBottom:"4px"}}>
          {pw.hasNationalDex?"Remover Pokedex Nacional":"Marcar Pokedex Nacional"}
        </button>
        {!confirmReset ? (
          <button className="btn" onClick={onReset} style={{width:"100%",padding:"8px",borderRadius:"6px",background:"#161b22",border:"1px solid #7f1d1d",color:"#ef4444",fontSize:"10px",marginBottom:"8px"}}>
            Apagar save e comecar novo
          </button>
        ) : (
          <div style={{background:"#2d1a1a",border:"1px solid #7f1d1d",borderRadius:"8px",padding:"12px",marginBottom:"8px",textAlign:"center"}}>
            <div style={{fontSize:"11px",color:"#ef4444",fontWeight:"bold",marginBottom:"8px"}}>Tem certeza? Isso apaga TODO o progresso.</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
              <button className="btn" onClick={onResetConfirm} style={{padding:"8px",borderRadius:"6px",background:"#7f1d1d",border:"none",color:"#fff",fontSize:"11px",fontWeight:"bold"}}>
                Confirmar
              </button>
              <button className="btn" onClick={onResetCancel} style={{padding:"8px",borderRadius:"6px",background:"#21262d",border:`1px solid ${C.bor}`,color:C.gray,fontSize:"11px"}}>
                Cancelar
              </button>
            </div>
          </div>
        )}

        {stroll&&<>
          <Dv label="PASSEIO ATUAL"/>
          <SR label="Rota"   v={stroll.route.name}/>
          <SR label="Passos" v={stroll.steps.toLocaleString()}/>
          <SR label="Watts disponíveis" v={`${stroll.watts}W`} c={C.yellow}/>
          <SR label="Pokémon capturados" v={`${stroll.capturedPokemon.length}/3`} c={C.purple}/>
          <SR label="Itens encontrados"  v={`${stroll.foundItems.length}/3`}      c={C.green}/>
        </>}

        {pw.sessions.length>0&&<>
          <Dv label="ÚLTIMOS PASSEIOS"/>
          {pw.sessions.slice(0,6).map(s=>(
            <div key={s.id} style={{background:"#161b22",borderRadius:"6px",padding:"8px 10px",marginBottom:"5px",border:`1px solid ${C.bor}`}}>
              <div style={{fontSize:"11px",color:C.white,marginBottom:"3px"}}>{s.pokemon} · {s.route}<span style={{float:"right",fontSize:"10px",color:C.gray}}>{s.date}</span></div>
              <div style={{fontSize:"10px",color:C.gray}}>{s.steps.toLocaleString()} passos · +{s.wattsReturned}W · +{s.expAfter-s.expBefore} EXP{s.leveledUp&&<span style={{color:C.green}}> · ↑Lv.{s.levelAfter}</span>}</div>
            </div>
          ))}
        </>}
      </div>
    </div>
  );
}

function ResultScreen({result,onNew}){
  const {sess:s,newTotal,newUnlocked,prevTotal}=result;
  const newRoutes=ROUTES.filter(r=>r.watts<=newTotal&&r.watts>prevTotal&&!r.event&&(!r.nat||result.newNat));
  return (
    <div style={{animation:"slideUp .3s",overflowY:"auto",maxHeight:"280px"}}>
      <div style={{textAlign:"center",marginBottom:"14px"}}>
        <div style={{fontSize:"28px"}}>🏠</div>
        <div style={{fontSize:"12px",color:C.green,letterSpacing:"2px",marginTop:"4px"}}>RETORNOU AO DS</div>
      </div>
      <Grp label="ATUALIZE NO PKHEX">
        <SR label="EXP"        v={`${s.expBefore.toLocaleString()} → ${s.expAfter.toLocaleString()}`} c={C.amber}/>
        {s.leveledUp&&<SR label="LEVEL UP!" v={`Lv.${s.levelBefore} → Lv.${s.levelAfter}`} c={C.green}/>}
        <SR label="Felicidade" v={`${s.hapBefore} → ${s.hapAfter}`} c={C.pink}/>
      </Grp>
      <Grp label="WATTS">
        <SR label="Gerados (passos)"  v={`+${s.wattsFromSteps}W`}  c={C.gray}/>
        {s.balloonWatts>0&&<SR label="Balão coletado"  v={`+${s.balloonWatts}W`} c={C.green}/>}
        {s.wattsSpent>0  &&<SR label="Gastos (minijogos)" v={`−${s.wattsSpent}W`} c={C.red}/>}
        <SR label="Retornados ao DS"  v={`+${s.wattsReturned}W`}  c={C.yellow}/>
        <SR label="Total acumulado"   v={`${newTotal.toLocaleString()}W`} c={C.yellow}/>
      </Grp>
      {(s.capturedPokemon.length>0||s.foundItems.length>0)&&(
        <Grp label="ADICIONE AO JOGO">
          {s.capturedPokemon.map((p,i)=><SR key={i} label="Pokémon" v={`${EMOJI[p.name]||"🔵"} {p.name} ${p.gender} Lv.${p.level}`} c={C.purple}/>)}
          {s.foundItems.map((it,i)=><SR key={i} label="Item" v={it.name||it} c={C.green}/>)}
        </Grp>
      )}
      {newRoutes.length>0&&(
        <div style={{background:"#1a2e1a",border:`1px solid ${C.green}`,borderRadius:"8px",padding:"10px",marginBottom:"10px"}}>
          <div style={{fontSize:"11px",color:C.green,fontWeight:"bold",marginBottom:"4px"}}>🔓 Nova rota desbloqueada!</div>
          {newRoutes.map(r=><div key={r.id} style={{fontSize:"11px",color:C.white}}>▸ {r.name}</div>)}
        </div>
      )}
      <Btn onClick={onNew} label="▶ NOVO PASSEIO" color={C.gdim}/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MICRO-COMPONENTES
// ═══════════════════════════════════════════════════════════════
const STitle=({title,color})=><div style={{fontSize:"10px",color:color||C.blue,letterSpacing:"2px",marginBottom:"12px",textAlign:"center"}}>{title}</div>;
const TBar=({title,onBack})=>(
  <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
    {onBack&&<button className="btn" onClick={onBack} style={{padding:"4px 8px",borderRadius:"5px",background:"#21262d",border:`1px solid ${C.bor}`,color:C.gray,fontSize:"11px"}}>◀</button>}
    <span style={{fontSize:"11px",color:C.blue,letterSpacing:"2px",fontWeight:"bold"}}>{title}</span>
  </div>
);
const Grp=({label,children})=><div style={{marginBottom:"10px"}}><div style={{fontSize:"9px",color:C.gray,letterSpacing:"2px",marginBottom:"5px"}}>{label}</div>{children}</div>;
const Dv=({label})=><div style={{fontSize:"9px",color:C.gray,letterSpacing:"2px",padding:"8px 0 4px"}}>{label}</div>;
const Rw=({label,children})=><div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"5px"}}><div style={{fontSize:"10px",color:C.gray,minWidth:"82px"}}>{label}</div><div style={{flex:1}}>{children}</div></div>;
const Inp=({v,on,type="text",ph=""})=><input type={type} value={v} placeholder={ph} onChange={e=>on(e.target.value)} style={{width:"100%",padding:"6px 8px",background:"#21262d",border:`1px solid ${C.bor}`,borderRadius:"5px",color:C.white,fontFamily:"'Courier New',monospace",fontSize:"12px",boxSizing:"border-box",outline:"none"}}/>;
const Btn=({onClick,label,disabled,color,bor})=><button className="btn" onClick={onClick} disabled={disabled} style={{display:"block",width:"100%",padding:"11px",borderRadius:"8px",background:disabled?"#21262d":(color||C.gdim),border:`1px solid ${bor||(disabled?"#21262d":(color||C.gdim))}`,color:disabled?C.gray:"#fff",fontSize:"12px",letterSpacing:"2px",fontWeight:"bold"}}>{label}</button>;
const Pill=({label,value,color})=><div style={{background:"#161b22",border:`1px solid ${C.bor}`,borderRadius:"6px",padding:"6px 4px",textAlign:"center"}}><div style={{fontSize:"9px",color:C.gray,marginBottom:"2px"}}>{label}</div><div style={{fontSize:"12px",color:color||C.white,fontWeight:"bold"}}>{value}</div></div>;
const ISlot=({label,count,max,value,color})=><div style={{flex:1,background:"#161b22",border:`1px solid ${C.bor}`,borderRadius:"6px",padding:"5px 4px",textAlign:"center"}}><div style={{fontSize:"9px",color:C.gray,marginBottom:"2px"}}>{label}</div><div style={{fontSize:"11px",color:color||C.white,fontWeight:"bold"}}>{value!==undefined?value:`${count}/${max}`}</div></div>;
const SR=({label,v,c})=><div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #21262d",fontSize:"11px"}}><span style={{color:C.gray}}>{label}</span><span style={{color:c||C.white,fontWeight:"bold"}}>{v}</span></div>;
const HPB=({label,hp,max,color})=><div><div style={{display:"flex",justifyContent:"space-between",fontSize:"10px",marginBottom:"3px"}}><span style={{color:C.gray}}>{label}</span><span style={{color}}>{hp}/{max}</span></div><div style={{background:"#21262d",borderRadius:"3px",height:"7px",overflow:"hidden"}}><div style={{width:`${(hp/max)*100}%`,height:"100%",background:color,borderRadius:"3px",transition:"width .3s"}}/></div></div>;
const MBtn=({icon,label,sub,disabled,onClick,color})=><button className="btn" onClick={onClick} disabled={disabled} style={{padding:"10px 12px",borderRadius:"8px",textAlign:"left",width:"100%",background:disabled?"#0d1117":"#161b22",border:`1px solid ${disabled?"#21262d":color||C.bor}`,opacity:disabled?0.45:1}}><div style={{display:"flex",alignItems:"center",gap:"10px"}}><span style={{fontSize:"18px"}}>{icon}</span><div><div style={{fontSize:"12px",color:disabled?C.gray:C.white,fontWeight:"bold"}}>{label}</div><div style={{fontSize:"10px",color:disabled?C.red:C.gray,marginTop:"1px"}}>{sub}</div></div></div></button>;
const ABt=({icon,label,sub,onClick,color})=><button className="btn" onClick={onClick} style={{padding:"10px 4px",borderRadius:"8px",textAlign:"center",background:"#161b22",border:`1px solid ${color||C.bor}`}}><div style={{fontSize:"20px"}}>{icon}</div><div style={{fontSize:"10px",color:C.white,fontWeight:"bold",marginTop:"3px"}}>{label}</div><div style={{fontSize:"9px",color:C.gray,marginTop:"1px"}}>{sub}</div></button>;


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Pokewalker/>);
  </script>
</body>
